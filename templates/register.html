{% extends "base.html" %}
{% block title %}Register Admin - CRS{% endblock %}

{% block content %}
<div class="page-header text-center">
    <h2>Create Admin Account</h2>
    <p class="subtitle">Join as administrator to securely access candidate data.</p>
</div>

<div class="form-container glass-panel" style="max-width: 400px; margin-top: 2rem;">
    <form action="{{ url_for('auth.register') }}" method="POST" class="styled-form">
        <div class="form-group">
            <label for="username">Choose Username</label>
            <input type="text" id="username" name="username" required class="form-input" placeholder="admin">
        </div>
        
        <div class="form-group">
            <label for="password">Choose Password</label>
            <input type="password" id="password" name="password" required class="form-input" placeholder="••••••••">
        </div>
        
        <div class="form-actions" style="margin-top: 1.5rem; justify-content: center;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </div>
        <div class="text-center mt-4">
            <p class="text-muted" style="font-size: 0.9rem;">
                Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--accent-primary);">Log in</a>
            </p>
        </div>
    </form>
</div>
{% endblock %}
